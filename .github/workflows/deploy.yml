name: Deploy Portfolio

on:
  push:
    branches:
      - main        # Remote default branch for SauravShadow/Portfolio

jobs:
  deploy:
    runs-on: self-hosted      # Runs on YOUR Windows machine via the local runner

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Update and Deploy Portfolio
        run: |
          cd /home/subaru/projects/Portfolio/Portfolio
          git fetch origin
          git reset --hard origin/main
          sg docker -c "docker build -t portfolio:latest ."
          sg docker -c "docker stop portfolio || true"
          sg docker -c "docker rm portfolio || true"
          sg docker -c "docker run -d --name portfolio -p 8080:8080 portfolio:latest"
          sg docker -c "docker image prune -a -f --filter 'until=24h'"

      - name: Verify container is running
        run: |
          status=$(docker inspect --format="{{.State.Status}}" portfolio)
          if [ "$status" != "running" ]; then
            echo "Portfolio container is NOT running. Status: $status"
            exit 1
          fi
          echo "Portfolio container is running successfully."
